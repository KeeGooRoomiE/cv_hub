name: Deploy CV Hub to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Build Astro site
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify_telegram:
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Notify Telegram
        run: |
          if [ -z "${{ secrets.PIPLINE_BOT_SECRET }}" ] || [ -z "${{ secrets.CHAT_ID }}" ]; then
            echo "No telegram secrets, skipping notification"
            exit 0
          fi

          STATUS="${{ needs.deploy.result }}"

          if [ "$STATUS" = "success" ]; then
            TEXT="@${{ github.actor }}%0A✅ Deployment succeeded!%0AVisit the site:%0Ahttps://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          else
            TEXT="@${{ github.actor }}%0A❌ Deployment failed!"
          fi

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.PIPLINE_BOT_SECRET }}/sendMessage" \
            -d chat_id="${{ secrets.CHAT_ID }}" \
            -d text="$TEXT"