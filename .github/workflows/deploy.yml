name: Deploy CV Hub to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Build Astro site
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify_telegram:
    needs: [build, deploy]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Notify Telegram
        run: |
          if [ -z "${{ secrets.PIPLINE_BOT_SECRET }}" ] || [ -z "${{ secrets.CHAT_ID }}" ]; then
            echo "No telegram secrets, skipping notification"
            exit 0
          fi

          BUILD_STATUS="${{ needs.build.result }}"
          DEPLOY_STATUS="${{ needs.deploy.result }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"

          if [ "$BUILD_STATUS" = "success" ] && [ "$DEPLOY_STATUS" = "success" ]; then
            TEXT="@${{ github.actor }}%0A✅ Deployed successfully!%0ABranch: ${{ github.ref_name }}%0ACommit: ${SHORT_SHA}%0A🌐 https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          elif [ "$BUILD_STATUS" != "success" ]; then
            TEXT="@${{ github.actor }}%0A❌ Build failed!%0ABranch: ${{ github.ref_name }}%0ACommit: ${SHORT_SHA}"
          else
            TEXT="@${{ github.actor }}%0A❌ Deploy failed!%0ABranch: ${{ github.ref_name }}%0ACommit: ${SHORT_SHA}"
          fi

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.PIPLINE_BOT_SECRET }}/sendMessage" \
            -d chat_id="${{ secrets.CHAT_ID }}" \
            -d text="$TEXT"