    subtitle: "Четыре дизайна, один файт"
    src: /media/projects/s-s-platformer/boss-manhours.jpg
    alt: "Босс человеко-часов (ЧЧ) против двух сестёр, сверху хелсбар"
    body: |
      Босс человеко-часов прошёл через четыре подхода — часы с ножками и лицом из циферблата, круглая голова с двумя «Ч»-антеннами, усатый Ч-Ч на ножках-буквах и откровенно мексиканский Ч-Ч — пока не остановился на самом читаемом варианте: две отдельные «Ч» с глазами, показанные здесь прямо в бою против сестёр.

  - type: image
    title: "Босс — трёхглавый заказчик"
    src: /media/projects/s-s-platformer/boss-final.png
    alt: "Финальный босс — трёхглавый Прораб-Заказчик-Подрядчик в виде трёх Марио"
    caption: "Сначала набросан как три головы в касках, затем переделан в трёх Марио."

  - type: divider

  - type: text
    title: "Сестра-компаньон"
    body: |
      Ты управляешь одной сестрой, вторая следует автоматически. Не дать напарнику застрять в платформере — классическая головная боль, а тут она встретилась с трёхнедельным дедлайном.

      Вместо того чтобы жечь дни на pathfinding, я принял честное решение: когда вторая сестра отстаёт или цепляется за геометрию, она просто пролетает сквозь текстуры, чтобы догнать, прикрытая маленьким спрайтом вскарабкивания — чтобы это читалось как задуманное. Это костыль, и он работает. (А её вариант в ковид-маске двигается вдвое быстрее — шутка, ставшая фичей.)

  - type: divider

  - type: text
    title: "Арт-пайплайн"
    body: |
      Облик собран из нескольких намеренных решений:

      - Всё рисуется в 1× и масштабируется в 4× — крупный, читаемый пиксель в размер Марио.
      - Каждый блок земли использует реальную цветовую палитру конкретного интерьера — так что реальная работа студии буквально становится рельефом.
      - Референсы интерьеров были слишком детальными для пиксельной игры, поэтому я написал шейдер дизеринга как оверлей, чтобы «опикселить» их под разрешение игры — «перерисовать референсы в пиксель» из ТЗ, решённое шейдером, а не вручную.
      - Спрайт сестёр адаптирован из шаблона персонажа моей старой игры Westland (зомби на Диком Западе).
      - Мобильные кнопки взяты из пиксельного UI-кита, который у меня уже был, перекрашены в розовый, иконки нарисованы вручную.

  - type: image
    title: "Дизеринг интерьера"
    src: /media/projects/s-s-platformer/interior-library.jpg
    alt: "Уровень на фоне дизерного интерьера-библиотеки, с летящей фразочкой"
    caption: "Реальный интерьер, прогнанный через шейдер дизеринга, пока не сел внутрь пиксель-арта."

  - type: divider

  - type: text
    title: "Дизайн-решения и баланс"
    body: |
      С простой игрой и жёстким дедлайном баланс означал вычитание:

      - Без жизней. Они бы только утяжелили лёгкий опыт.
      - Одно касание проваливает попытку — это сделало падающие угрозы и боссов лёгкими для настройки вокруг единого ясного правила.
      - Меньше падающих объектов на сцену, под размер экрана, вместо более плотного хаоса.
      - «Грибок»-гейт, ограничивающий стрельбу одной точкой в отдельной комнате прямо перед боссом.
      - Синий блюпринт работает и как чекпоинт; счётчик в духе 2/10 отслеживает собранные атрибуты.

  - type: divider

  - type: text
    title: "Награды как лут"
    body: |
      Реальные награды студии стали дропом. Один ящик с наградой выпускает столько кубков, сколько было настоящих номинаций — так ящик World Luxury Awards 2023 (Best Hotel, Best Spa, Best Restaurant) рассыпается на три, а Gold Key 2018 и годы Palme d'Or добавляют свои.

      Пятеро детей — тоже лут: за жизнь студии у двух основательниц родилось пятеро — Мика, Мирон, Алиса, Василиса и Мартин — каждого выбивают из ящика, в реальные даты рождения, та сестра, что является его мамой.

  - type: divider

  - type: text
    title: "Интро и финал"
    body: |
      Игра открывается логотипом Super Mario; сёстры подбегают и разбивают его (кастомная, слегка костыльная самодельная анимация), появляется лого S+S, и всплывает строка: «Let's go across S+S from 2004 to 2024… and beyond». Одна кнопка: Let's go.

      Заканчивается так, как хотело ТЗ — сёстры уплывают на лодке к проекту мечты: «And beyond to your dream project!»

  - type: divider

  - type: image
    title: "Веб и тач"
    src: /media/projects/s-s-platformer/mobile-controls.jpg
    alt: "Мобильная сборка с экранным тач-управлением — стрелки и кнопка стрельбы"
    body: |
      Игра на HTML5 — запускается в любом браузере, на любом компьютере, без установки. Для телефонов — мобильный вьюпорт и экранное тач-управление: пиксельный UI-кит, перекрашенный в розовый, с нарисованными вручную иконками, так что PC и мобилка делят один интерфейс.

  - type: divider

  - type: text
    title: "Пасхалки и детали"
    bullets:
      - "В игре про Сундуковых нет ни одного сундука — поэтому я всё равно его нарисовал и спрятал в файлах."
      - "Сёстры говорят фразы, которые реально произносят в жизни — десятки настоящих студийных реплик пролетают по уровням."
      - "Три часа ушли в бегающих животных (зебры, жирафы, кони) — кони оказались слишком смешными, чтобы остановиться."
      - "Какое-то время один из детей, Мартин, выходил в сборке кубком вместо младенца. С тех пор он восстановлен в правах ребёнка."

  - type: image
    src: /media/projects/s-s-platformer/phrases.jpg
    alt: "Внутриигровая сцена с летящей фразочкой — «Ира, Ира, ты с нами?»"
    caption: "Реальные студийные реплики пролетают по уровням — здесь рядом ящики и ключ."

  - type: divider

  - type: text
    title: "Итог"
    bullets:
      - Сделано за три недели, в одиночку, включая весь арт
      - Основательницы остались очень довольны
      - В игру играл весь коллектив на корпоративе по случаю дня рождения сестёр
      - Сделано для студии из списка Forbes — и ссылка всё ещё жива
      - "Играть: sundukovy.com/game"

  - type: divider

  - type: text
    title: "Выводы"
    body: |
      S+S — маленькая игра, которая сработала благодаря ограничениям, а не вопреки им.

      Фиксированный трёхнедельный соло-бюджет вынуждал к ясности на каждом шаге: без жизней, провал с одного касания, механики через предметы, шейдер вместо ручного опикселивания сотен интерьеров и честный костыль напарницы вместо идеального pathfinding. Ничего технически навороченного — и всё ради единственной цели: сделать что-то намеренно простое, но с душой.

      А душу дало то, что контентом игры стала сама история клиента — и даже фрустрации индустрии: правки, бюджеты и человеко-часы. В результате получился подарок, который безошибочно про этих людей, эту студию, эти двадцать лет.
