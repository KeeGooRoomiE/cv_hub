  - type: text
    title: "Обзор"
    body: |
      S+S — небольшой браузерный платформер, который превращает двадцать лет студии интерьерного дизайна в играбельного Марио.

      Сёстры Сундуковы — студия из списка Forbes, которой руководят Ира и Оля Сундуковы — захотели необычный подарок на день рождения основательниц: игру. Не серьёзную. Намеренно простую, пиксельную, «выглядит простенько, но с душой». Четыре уровня, каждый про пять лет истории студии, а героинями стали сами основательницы.

      Я сделал её в одиночку за три недели. В итоге в неё играл весь коллектив на корпоративе по случаю дня рождения сестёр, и ссылка жива до сих пор.

  - type: divider

  - type: text
    title: "Бриф"
    body: |
      Запрос был конкретным и обаятельно прямым: «Хотим Марио про девочек, за три недели, в подарок».

      Письменное ТЗ задало форму:
      - Ощущение Super Mario — в идеале ровно такое движение.
      - Два играбельных персонажа, Ира и Оля, отрисованные в пикселе по фото. Управляешь одной, вторая следует автоматически.
      - Четыре уровня, каждый — пять лет из двадцатилетней истории.
      - Вместо грибов и блоков с вопросом — сбор атрибутов реальных проектов студии, со счётчиком «собрано 2/10» вверху.
      - Мини-босс в конце каждого уровня — «самый придирчивый заказчик?».
      - Финал в духе Super Mario: героини добираются до проекта мечты, салют, победная музыка.

      Ограничения и были всей задачей геймдизайна: фиксированный трёхнедельный заказ, соло, фуллтайм — и графики ещё не существовало.

  - type: text
    title: "Работа без ассетов"
    body: |
      Поскольку визуала проектов на старте не было, я сначала собрал каркас — движение, коллизии, сборы, цикл уровня — и параллельно вытягивал контент из клиента.

      Главный вопрос, который я отправил обратно, был прост: «Есть описание пути студии за первые пять лет с примерами визуала, чтобы я организовал уровни?». Ответ и стал левел-дизайном: каждая веха, награда и даже каждый из пятерых детей основательниц превратились в объект для расстановки.

  - type: divider

  - type: image
    title: "Реальные интерьеры студии — в пикселях"
    subtitle: "Обе сестры на дизерном фоне-проекте"
    src: /media/projects/s-s-platformer/interior-restaurant.jpg
    alt: "Обе сестры на уровне, за ними реальный интерьер ресторана студии"
    body: |
      Две сестры в пиксельной форме, а за ними — один из реальных ресторанных интерьеров студии, продизеренный до разрешения игры, чтобы читаться как рельеф, а не как фотография.

  - type: text
    title: "История как платформер"
    body: |
      Каждый из четырёх уровней — пятилетняя эпоха, открывающаяся фразой голосом самой студии:

      - 2004–2010 — «Мы хотим, чтобы наш дизайн был узнаваем!»
      - 2011–2016 — «Опять эти Сундуковы!»
      - 2017–2020 — «Нас ждёт международное признание!»
      - 2020–2024 — «Держим путь на Дубай и Кипр!»

      Сборы — это реальная хронология: первый проект с Accor, выход на международный рынок с Pullman Berlin, Париж 2017, Дизайнер года 2018, офисы в Дубае и на Кипре. Двадцать лет, рассказанные сайд-скроллом.

  - type: divider

  - type: text
    title: "Обучение без стены текста"
    body: |
      Каждая механика объясняется так, как говорит сама игра — через тематический предмет с одной диегетической строкой, поданный в изоляции до того, как он начнёт что-то значить под давлением (намеренный ABC-подход к онбордингу):

      - Ключи — «Вам открыты все двери».
      - Кубки — «Вы лучшие, получите вашу награду».
      - Дети — «Студия — ваше детище, но и мамами пятерых вы стали — ловите их».
      - Синий блюпринт — «Каждый ваш проект лучше предыдущего, переходите к новому». (Он же — точка чекпоинта.)
      - И угрозы: уворачивайтесь от бюджета, правок и ковида и реализуйте дизайн один в один как на рендере.

      Онбординг заканчивается на нужной ноте: «Удача сопутствовала вам все двадцать лет, но тут вы все сами ;)»

  - type: divider

  - type: text
    title: "Боссы — враги индустрии"
    body: |
      Именно здесь игра нашла свою душу — и здесь бриф тихо изменился.

      ТЗ просило буквальных боссов — прораба, бюджет, «самого придирчивого заказчика». Вместо этого в релиз вышли абстрактные враги, с которыми реально воюет каждый дизайнер, нарисованные мило в покемон-регистре с щепоткой пиксельного Cuphead. Больше всего времени проекта ушло именно сюда.

      - Правки — сложенный блюпринт, проткнутый карандашом; стреляет карандашами. «Не дайте правкам перелопатить ваш дизайн!»
      - Бюджет — мешок денег в покемон-стиле; стреляет деньгами. «Не позвольте оптимизации бюджета удешевить дизайн!»
      - Человеко-часы (ЧЧ) — две буквы «Ч» с глазами, русское сокращение для оплачиваемых часов. «Дальше правки только по ДС!»
      - Финальный босс — трёхглавый Прораб-Заказчик-Подрядчик, трёхглавый Марио вместо совещания на объекте, где все винят дизайнера. «Не позвольте им повесить это на вас!»

