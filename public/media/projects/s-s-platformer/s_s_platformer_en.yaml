  - type: divider

  - type: text
    title: "The companion sister"
    body: |
      You control one sister; the other follows automatically. Keeping a follower from getting stuck in a platformer is a classic headache — and here it met a three-week deadline.

      Rather than burn days on pathfinding, I made the honest call: when the second sister falls behind or snags on geometry, she simply flies through the textures to catch up, masked by a little climbing-up sprite so it reads as intentional. It is a hack, and it works. (Her covid-mask variant, meanwhile, moves at double speed — a joke that became a feature.)

  - type: divider

  - type: text
    title: "Art pipeline"
    body: |
      The look is built from a few deliberate decisions:

      - Everything is drawn at 1× and scaled 4× — the chunky, readable Mario pixel size.
      - Every ground block uses the actual color palette of a specific interior, so the studio's real work is literally the terrain.
      - The interior references were far too detailed for a pixel game, so I wrote a dithering shader as an overlay to "pixelate" them down to the game's resolution — the brief's "redraw the references in pixel," solved as a shader rather than by hand.
      - The sisters' sprite was adapted from a character template in an older game of mine, Westland (zombies in the wild west).
      - The mobile buttons came from a pixel UI kit I already owned, recolored pink with icons drawn by hand.

  - type: image
    title: "Dithering an interior"
    src: /media/projects/s-s-platformer/interior-library.jpg
    alt: "A level set against a dithered library interior, with a floating catchphrase"
    caption: "A real interior, run through the dithering shader until it sits inside the pixel art."

  - type: divider

  - type: text
    title: "Design decisions & balance"
    body: |
      With a simple game and a hard deadline, balance meant subtracting:

      - No lives. Adding them would only weigh down a light experience.
      - One touch fails the run — which made the falling hazards and the bosses easy to tune around a single, clear rule.
      - Fewer falling objects per scene, sized to the screen, instead of denser chaos.
      - A "mushroom" gate that restricts shooting to one spot in a dedicated room right before a boss.
      - The blue blueprint doubles as the checkpoint; a 2/10-style counter tracks collected attributes.

  - type: divider

  - type: text
    title: "Awards as loot"
    body: |
      The studio's real awards became drops. Breaking a single award box releases as many cups as there were actual nominations — so the World Luxury Awards 2023 box (Best Hotel, Best Spa, Best Restaurant) bursts into three, while Gold Key 2018 and the Palme d'Or years add their own.

      The five children are loot too: across the studio's life the two founders had five kids — Mika, Miron, Alisa, Vasilisa and Martin — each knocked from a box, on real birthdates, by the sister who is their mother.

  - type: divider

  - type: text
    title: "Intro & ending"
    body: |
      The game opens on the Super Mario logo; the sisters run up and smash it (a custom, slightly janky hand-made animation), the S+S logo appears, and a line rises: "Let's go across S+S from 2004 to 2024… and beyond." One button: Let's go.

      It ends the way the brief wanted — the sisters sail off on a boat toward the project of their dreams: "And beyond to your dream project!"

  - type: divider

  - type: image
    title: "Web & touch"
    src: /media/projects/s-s-platformer/mobile-controls.jpg
    alt: "Mobile build with on-screen touch controls — arrows and a shoot button"
    body: |
      The game is HTML5 — it runs in any browser, on any computer, with no install. For phones it ships a mobile viewport and on-screen touch controls: a pixel UI kit recolored pink, with hand-drawn icons, so PC and mobile share one interface.

  - type: divider

  - type: text
    title: "Easter eggs & details"
    bullets:
      - "There is not a single chest in a game about the Sundukovs (sunduk means chest in Russian) — so I drew one anyway and hid it in the files."
      - "The sisters speak the phrases they actually say in real life — dozens of real studio one-liners float through the levels."
      - "Three hours vanished into the running animals (zebras, giraffes, horses) — the horses turned out too funny to stop."
      - "For a while one of the children, Martin, shipped as a trophy instead of a baby. He has since been promoted back to child."

