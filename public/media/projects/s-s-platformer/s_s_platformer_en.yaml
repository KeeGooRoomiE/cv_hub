      The man-hours boss went through four takes — a clock with legs whose face is the dial, a round head flanked by two "Ч" antennae, a mustachioed Ч-Ч on letter-legs, and a frankly mexican Ч-Ч — before settling on the cleanest read: two separate "Ч" letters with eyes, shown here mid-fight against the sisters.

