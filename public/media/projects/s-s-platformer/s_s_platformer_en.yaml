  - type: text
    title: "Overview"
    body: |
      S+S is a small browser platformer that turns twenty years of an interior-design studio into a playable Mario.

      Sundukovy Sisters — a Forbes-featured studio run by Ira and Olya Sundukov — wanted an unusual gift for the founders' birthday: a game. Not a serious one. Deliberately simple, pixelated, "looks plain but has soul." Four levels, each covering five years of the studio's history, with the founders themselves as the heroes.

      I built it solo in three weeks. The result was played by the whole team at the founders' corporate birthday party, and the link is still live today.

  - type: divider

  - type: text
    title: "The brief"
    body: |
      The ask was specific and charmingly blunt: "We want a Mario about girls, in three weeks, as a gift."

      The written brief filled in the shape:
      - The feel of Super Mario — ideally that exact kind of movement.
      - Two playable characters, Ira and Olya, drawn in pixel art from photos. You control one; the other follows automatically.
      - Four levels, each representing five years of a twenty-year history.
      - Instead of mushrooms and question blocks, you collect attributes from the studio's real projects, with a "collected 2/10" counter at the top.
      - A mini-boss at the end of each level — "the pickiest client?"
      - A Super Mario-style finale: the heroes reach their dream project, fireworks, victory music.

      Constraints were the whole game design problem: a fixed three-week commission, solo, full-time — and the artwork did not exist yet.

  - type: text
    title: "Working without assets"
    body: |
      Because none of the project visuals existed at the start, I built the framework first — movement, collisions, collectibles, the level loop — and pulled the content from the client in parallel.

      The key question I sent back was simply: "Do you have a description of the studio's path for the first five years, with visual examples, so I can lay out the levels?" The answer became the level design: each milestone, award and even each of the founders' five children became an object to place.

  - type: divider

  - type: image
    title: "The studio's real interiors, in pixels"
    subtitle: "Both sisters on a dithered project backdrop"
    src: /media/projects/s-s-platformer/interior-restaurant.jpg
    alt: "Both sisters on a level with a real studio restaurant interior behind them"
    body: |
      The two sisters in their pixel form, with one of the studio's real restaurant interiors behind them — dithered down to the game's resolution so it reads as terrain rather than a photo.

  - type: text
    title: "History as a platformer"
    body: |
      Each of the four levels is a five-year era, opening with a line in the studio's own voice:

      - 2004–2010 — "We want our design to be recognizable!"
      - 2011–2016 — "Those Sundukovy again!"
      - 2017–2020 — "International recognition awaits us!"
      - 2020–2024 — "Heading for Dubai and Cyprus!"

      The collectibles are the real timeline: the first Accor project, the move into the international market with Pullman Berlin, Paris 2017, Designer of the Year 2018, the Dubai and Cyprus offices. Twenty years told as a side-scroll.

  - type: divider

  - type: text
    title: "Teaching without a tutorial wall"
    body: |
      Every mechanic is taught the way the game speaks — through a themed item with a single diegetic line, introduced in isolation before it ever matters under pressure (a deliberate ABC approach to onboarding):

      - Keys — "All doors are open to you."
      - Cups — "You're the best, take your award."
      - Children — "The studio is your brainchild, but you also became mothers of five — catch them."
      - Blue blueprint — "Each project is better than the last; move to the next one." (It also acts as the checkpoint.)
      - And the hazards: dodge the budget, the edits and the covid, and deliver the design exactly like the render.

      The onboarding ends on the right note: "Luck was with you for twenty years — here, you're on your own ;)"

  - type: divider

  - type: text
    title: "The bosses: the villains of the industry"
    body: |
      This is where the game found its soul, and where the brief quietly changed.

      The brief asked for literal bosses — a foreman, a budget, "the pickiest client." What shipped instead were the abstract villains every designer actually fights, drawn cute in a pokémon register with a touch of pixel Cuphead. Most of the project's time went here.

      - Edits — a folded blueprint pierced by a pencil; it shoots pencils. "Don't let the edits overhaul your design!"
      - Budget — a pokémon-style money bag; it shoots money. "Don't let budget optimization cheapen the design!"
      - Man-hours (ЧЧ) — two letters "Ч" with eyes, the Russian shorthand for billable hours. "From here, edits only by extra agreement!"
      - The final boss — a three-headed Foreman-Client-Contractor, a three-headed Mario standing in for the on-site meeting where everyone blames the designer. "Don't let them pin it on you!"

