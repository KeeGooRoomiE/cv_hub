    bullets:
      - Delivered in three weeks, solo, including all art
      - The founders were delighted with it
      - Played by the whole team at the founders' corporate birthday
      - Made for a Forbes-featured studio — and the link is still live
      - "Play it: sundukovy.com/game"

  - type: divider

  - type: text
    title: "Takeaways"
    body: |
      S+S is a small game that worked because of its constraints, not despite them.

      A fixed three-week solo budget forced clarity at every turn: no lives, one-touch failure, mechanics taught through items, a shader instead of hand-pixeling hundreds of interiors, and an honest follower hack instead of perfect pathfinding. None of it is technically fancy — and all of it served a single goal: make something deliberately simple that still has soul.

      The part that gave it that soul was treating the client's own history — and even the industry's frustrations, the edits and budgets and man-hours — as the game's content. The result is a gift that is unmistakably about these people, this studio, these twenty years.
